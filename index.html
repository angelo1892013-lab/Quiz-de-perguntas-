<!DOCTYPE html>
<html>
<head>
  <title>Quiz Fix</title>
</head>

<body style="font-family: Arial; text-align:center;">

<h1>🎮 Quiz</h1>

<p id="pergunta">Clica em A, B ou C</p>

<button onclick="responder('A')">A</button>
<button onclick="responder('B')">B</button>
<button onclick="responder('C')">C</button>

<p id="msg"></p>
<p>🏆 Pontos: <span id="pontos">0</span></p>

<script>
let pontos = 0;
let index = 0;

let perguntas = [
  {q:"2+2?", a:"B"},
  {q:"Capital de Portugal?", a:"A"},
  {q:"JavaScript é usado para?", a:"C"}
];

function responder(opcao){

  if(opcao == perguntas[index].a){
    pontos++;
    document.getElementById("msg").innerText = "✔ Certo!";
  } else {
    document.getElementById("msg").innerText = "❌ Errado!";
  }

  document.getElementById("pontos").innerText = pontos;

  index++;

  if(index < perguntas.length){
    document.getElementById("pergunta").innerText = perguntas[index].q;
  } else {
    document.getElementById("pergunta").innerText = "Fim do jogo 🎉";
  }
}
</script>

</body>
</html>
