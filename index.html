<!DOCTYPE html>
<html>
<body style="text-align:center; font-family:Arial;">

<h1>🎮 Quiz</h1>

<p id="q">Carrega em começar</p>

<button onclick="start()">Começar</button>
<button onclick="reset()">Reiniciar</button>

<br><br>

<button onclick="res('A')">A</button>
<button onclick="res('B')">B</button>
<button onclick="res('C')">C</button>

<p id="msg"></p>
<p>Pontos: <span id="p">0</span></p>

<script>
let i = 0;
let pontos = 0;

let qs = [
  ["2+2?", "B"],
  ["Capital de Portugal?", "A"],
  ["JavaScript é para?", "C"]
];

function start(){
  i = 0;
  pontos = 0;
  show();
}

function show(){
  document.getElementById("q").innerText = qs[i][0];
  document.getElementById("msg").innerText = "";
  document.getElementById("p").innerText = pontos;
}

function res(x){
  if(x == qs[i][1]){
    pontos++;
    document.getElementById("msg").innerText = "✔ Certo";
  } else {
    document.getElementById("msg").innerText = "❌ Errado";
  }

  i++;

  if(i < qs.length){
    show();
  } else {
    document.getElementById("q").innerText = "Fim do jogo!";
  }
}

function reset(){
  start();
}
</script>

</body>
</html>
