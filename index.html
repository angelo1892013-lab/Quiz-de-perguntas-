
<!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>
</head>

<body style="font-family: Arial; text-align:center;">

<h1>🎮 Quiz Simples</h1>

<p id="pergunta">Quanto é 2 + 2?</p>

<button onclick="responder(3)">A: 3</button>
<button onclick="responder(4)">B: 4</button>
<button onclick="responder(5)">C: 5</button>

<p id="msg"></p>
<p>🏆 Pontos: <span id="pontos">0</span></p>

<script>
let pontos = 0;

function responder(resposta){
  if(resposta == 4){
    pontos++;
    document.getElementById("msg").innerText = "✔ Certo!";
  } else {
    document.getElementById("msg").innerText = "❌ Errado!";
  }

  document.getElementById("pontos").innerText = pontos;
}
</script>

</body>
</html>
