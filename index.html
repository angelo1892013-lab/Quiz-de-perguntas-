<!DOCTYPE html>
<html>
<head>
  <title>Quiz Game</title>
</head>

<body style="font-family: Arial; text-align:center;">

<h1>🎮 Quiz Game</h1>

<p id="question">Carrega em começar</p>

<button onclick="start()">▶ Começar</button>

<br><br>

<button onclick="answer('A')" id="A">A</button>
<button onclick="answer('B')" id="B">B</button>
<button onclick="answer('C')" id="C">C</button>

<p id="msg"></p>
<p>🏆 Pontos: <span id="score">0</span></p>

<script>
let score = 0;
let i = 0;

let questions = [
  {q:"2 + 2 = ?", a:"B", op:["3","4","5"]},
  {q:"Capital de Portugal?", a:"A", op:["Lisboa","Madrid","Paris"]},
  {q:"JavaScript serve para?", a:"C", op:["Cozinhar","Desenhar","Sites"]}
];

function start(){
  show();
}

function show(){
  let q = questions[i];

  document.getElementById("question").innerText = q.q;

  document.getElementById("A").innerText = "A: " + q.op[0];
  document.getElementById("B").innerText = "B: " + q.op[1];
  document.getElementById("C").innerText = "C: " + q.op[2];

  document.getElementById("msg").innerText = "";
}

function answer(op){

  if(op == questions[i].a){
    score++;
    document.getElementById("msg").innerText = "✔ Certo!";
  } else {
    document.getElementById("msg").innerText = "❌ Errado!";
  }

  document.getElementById("score").innerText = score;

  i++;

  if(i < questions.length){
    show();
  } else {
    document.getElementById("question").innerText = "Fim do jogo 🎉";
    document.getElementById("A").style.display = "none";
    document.getElementById("B").style.display = "none";
    document.getElementById("C").style.display = "none";
  }
}
</script>

</body>
</html>
